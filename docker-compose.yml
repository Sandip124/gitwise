services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: gitwise-db
    environment:
      POSTGRES_DB: gitwise
      POSTGRES_USER: gitwise
      POSTGRES_PASSWORD: gitwise
    ports:
      - "5432:5432"
    volumes:
      - gitwise-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gitwise"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  gitwise-data:
